<nav class="hidden md:flex items-center gap-8 h-full">

<div class="absolute inset-0 pointer-events-none opacity-5 overflow-hidden">

<input class="underline-input w-full text-2xl font-headline italic text-primary pb-2 placeholder-surface-container-highest" placeholder="e.g. Value Added Tax" type="text"/>

</select>

</div>
</div>
</div>
<!-- Amount Field -->
<div class="flex flex-col gap-3">
<div class="flex items-end justify-between gap-4">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-extrabold pb-2" style="">Amount</label>
<div class="flex-1">
<input class="underline-input w-full text-right text-lg font-headline text-primary" type="text" value="12%"/>
</div>
</div>

<span class="material-symbols-outlined text-[14px] mt-0.5" style='font-variation-settings: "FILL" 1;'>info</span>
                                Enter fixed amount or percentage value e.g. 12%
                            </p>
</div>
</div>
</div>
</div>
